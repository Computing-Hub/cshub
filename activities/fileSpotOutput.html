<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spot the Output — File Handling</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0; padding: 20px;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #1a2e2e 50%, #1a1a2e 100%);
  min-height: 100vh; color: #e0e0e0;
}
.container { max-width: 860px; margin: 0 auto; }
h1 {
  font-size: 2rem; font-weight: 700; text-align: center; margin: 0 0 4px;
  background: linear-gradient(135deg, #06b6d4, #8b5cf6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle { text-align: center; font-size: 0.95rem; color: #888; margin: 0 0 20px; }
.back-link { display: inline-block; margin-bottom: 14px; color: #06b6d4; text-decoration: none; font-size: 0.88rem; }
.back-link:hover { text-decoration: underline; }
.panel {
  background: #16213e; border-radius: 16px; border: 1px solid #2a2a4a;
  padding: 20px; margin-bottom: 18px;
}

/* Nav */
.challenge-nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
.nav-btn {
  font-family: 'Poppins', sans-serif; font-size: 0.82rem; font-weight: 600;
  padding: 8px 14px; border: none; border-radius: 10px; cursor: pointer;
  background: linear-gradient(135deg, #2a2a4a, #1a1a2e); color: #aaa;
  transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
  position: relative;
}
.nav-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(6,182,212,0.2); }
.nav-btn.active {
  background: linear-gradient(135deg, #06b6d4, #8b5cf6); color: #fff;
  box-shadow: 0 4px 18px rgba(6,182,212,0.35);
}
.nav-btn .badge {
  position: absolute; top: -6px; right: -6px; width: 18px; height: 18px;
  background: #43e97b; border-radius: 50%; font-size: 0.6rem; color: #000;
  display: flex; align-items: center; justify-content: center; font-weight: 700;
}

/* Score tracker */
.score-bar {
  display: flex; justify-content: center; gap: 24px; margin-bottom: 10px;
  font-size: 0.85rem; color: #888;
}
.score-bar span { font-weight: 600; }
.score-bar .score-val { color: #06b6d4; }

/* Question title */
.q-title {
  font-size: 1.05rem; font-weight: 600; margin: 0 0 4px; color: #e0e0e0;
}
.q-desc {
  font-size: 0.85rem; color: #999; margin: 0 0 14px; line-height: 1.5;
}

/* Code display */
.code-area {
  background: #0d1117; border-radius: 12px; border: 1px solid #30363d;
  padding: 20px; font-family: 'Fira Code', monospace;
  font-size: 0.92rem; line-height: 2; color: #c9d1d9;
  overflow-x: auto; white-space: pre-wrap; word-break: break-word;
  margin-bottom: 18px;
}

/* Syntax highlighting */
.kw { color: #ff79c6; }
.fn { color: #8be9fd; }
.str { color: #f1fa8c; }
.num { color: #bd93f9; }
.op { color: #ff79c6; }
.cm { color: #6272a4; font-style: italic; }
.meth { color: #50fa7b; }

/* Options */
.options-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.option-btn {
  font-family: 'Fira Code', monospace; font-size: 0.88rem; font-weight: 500;
  padding: 14px 18px; border: 2px solid #2a2a4a; border-radius: 12px;
  background: rgba(42,42,74,0.3); color: #e0e0e0; cursor: pointer;
  transition: transform 0.15s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
  text-align: center; word-break: break-word;
}
.option-btn:hover:not(.locked) {
  transform: translateY(-2px); border-color: #06b6d4;
  box-shadow: 0 4px 15px rgba(6,182,212,0.2);
}
.option-btn.selected {
  border-color: #06b6d4; background: rgba(6,182,212,0.1);
}
.option-btn.correct {
  border-color: #43e97b; background: rgba(67,233,123,0.12); color: #43e97b;
  animation: popIn 0.3s ease;
}
.option-btn.wrong {
  border-color: #f7797d; background: rgba(247,121,125,0.1); color: #f7797d;
  animation: shake 0.4s ease;
}
.option-btn.locked { cursor: default; opacity: 0.6; }
.option-btn.correct.locked { opacity: 1; }

/* Buttons */
.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
.btn {
  font-family: 'Poppins', sans-serif; font-size: 0.88rem; font-weight: 600;
  padding: 10px 24px; border: none; border-radius: 10px; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s; color: #fff;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-check { background: linear-gradient(135deg, #06b6d4, #0891b2); }
.btn-check:hover:not(:disabled) { box-shadow: 0 4px 18px rgba(6,182,212,0.4); }
.btn-next { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #000; display: none; }
.btn-next:hover:not(:disabled) { box-shadow: 0 4px 18px rgba(67,233,123,0.4); }
.btn-next.visible { display: inline-block; }
.btn-reset { background: linear-gradient(135deg, #667eea, #764ba2); }
.btn-reset:hover:not(:disabled) { box-shadow: 0 4px 18px rgba(102,126,234,0.4); }

/* Feedback */
.feedback {
  text-align: center; font-size: 0.9rem; font-weight: 600; padding: 12px;
  border-radius: 10px; margin-top: 14px; animation: slideInUp 0.35s ease;
  line-height: 1.6;
}
.feedback.success { background: rgba(67,233,123,0.12); color: #43e97b; border: 1px solid rgba(67,233,123,0.25); }
.feedback.error { background: rgba(247,121,125,0.12); color: #f7797d; border: 1px solid rgba(247,121,125,0.25); }
.hidden { display: none; }

/* Best score */
.best-score { text-align: center; font-size: 0.82rem; color: #666; margin-bottom: 6px; }
.best-score strong { color: #8b5cf6; }

/* Final results */
.results-panel { text-align: center; animation: slideInUp 0.4s ease; }
.results-panel .score-big {
  font-size: 3rem; font-weight: 700;
  background: linear-gradient(135deg, #06b6d4, #8b5cf6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.results-panel .score-label { color: #888; font-size: 1rem; margin-top: 4px; }

@keyframes slideInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes popIn { 0% { transform:scale(0.85); opacity:0; } 100% { transform:scale(1); opacity:1; } }
@keyframes shake { 0%,100% { transform:translateX(0); } 20% { transform:translateX(-6px); } 40% { transform:translateX(6px); } 60% { transform:translateX(-4px); } 80% { transform:translateX(4px); } }

@media (max-width: 600px) {
  body { padding: 12px; }
  h1 { font-size: 1.5rem; }
  .code-area { font-size: 0.8rem; padding: 14px; }
  .options-grid { grid-template-columns: 1fr; }
  .option-btn { font-size: 0.82rem; padding: 12px 14px; }
  .panel { padding: 14px; }
  .nav-btn { padding: 6px 10px; font-size: 0.75rem; }
}
</style>
</head>
<body>

<div class="container">
  <a href="../index.html" class="back-link">&larr; Back to Course</a>
  <h1>Spot the Output &mdash; File Handling</h1>
  <p class="subtitle">What does each Python file handling snippet produce? Pick the correct output.</p>

  <div class="panel">
    <div class="challenge-nav" id="challengeNav"></div>
    <div class="score-bar">
      <div>Question: <span class="score-val" id="questionNum">1/20</span></div>
      <div>Score: <span class="score-val" id="totalScore">0</span> / 20</div>
    </div>
    <div class="best-score" id="bestScoreBar"></div>
  </div>

  <div id="questionArea">
    <div class="panel">
      <div class="q-title" id="qTitle"></div>
      <div class="q-desc" id="qDesc"></div>
      <div class="code-area" id="codeArea"></div>
      <div class="options-grid" id="optionsGrid"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-check" id="btnSubmit" disabled>Submit Answer</button>
      <button class="btn btn-next" id="btnNext">Next Question &rarr;</button>
    </div>

    <div id="feedbackArea"></div>
  </div>

  <div id="resultsArea" class="hidden">
    <div class="panel results-panel">
      <div class="score-big" id="finalScore"></div>
      <p class="score-label" id="finalLabel"></p>
      <div style="margin-top:20px;">
        <button class="btn btn-reset" id="btnRestart">Start Again</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================
   QUESTIONS DATA — FILE HANDLING
   ============================================ */
const questions = [
  {
    title: "Q1. Filename Concatenation",
    desc: "What does this code print?",
    code: 'filename = "data" + ".txt"\nprint(filename)',
    options: ["data.txt", "data .txt", "data+.txt", "Error"],
    correct: 0,
    explanation: 'The + operator joins strings exactly. "data" + ".txt" produces "data.txt" with no extra spaces.'
  },
  {
    title: "Q2. Default Open Mode",
    desc: "What does this code print?",
    code: 'f = open("notes.txt")\nprint(f.mode)\nf.close()',
    options: ["w", "read", "r", "rw"],
    correct: 2,
    explanation: 'When no mode is specified, open() defaults to "r" (read mode). The .mode attribute returns the single character "r".'
  },
  {
    title: "Q3. Type of .read()",
    desc: 'File data.txt contains: Hello World\n\nWhat does this code print?',
    code: 'f = open("data.txt", "r")\ncontents = f.read()\nprint(type(contents).__name__)\nf.close()',
    options: ["list", "file", "str", "bytes"],
    correct: 2,
    explanation: '.read() returns the entire file content as a single string, so type() returns str.'
  },
  {
    title: "Q4. Type of .readlines()",
    desc: 'File data.txt contains: Apple\\nBanana\\nCherry\n\nWhat does this code print?',
    code: 'f = open("data.txt", "r")\ndata = f.readlines()\nprint(type(data).__name__)\nf.close()',
    options: ["str", "tuple", "list", "dict"],
    correct: 2,
    explanation: '.readlines() returns a list of strings, one per line. So type() returns list.'
  },
  {
    title: "Q5. First .readline()",
    desc: 'File names.txt contains:\nAlice\\nBob\\nCharlie\n\nWhat does this code print?',
    code: 'f = open("names.txt", "r")\nprint(f.readline().strip())\nf.close()',
    options: ["Alice\\nBob\\nCharlie", "Alice", "Bob", "['Alice', 'Bob', 'Charlie']"],
    correct: 1,
    explanation: '.readline() reads only the first line. .strip() removes the trailing newline character, giving "Alice".'
  },
  {
    title: "Q6. Two .readline() Calls",
    desc: 'File fruits.txt contains:\nApple\\nBanana\\nCherry\n\nWhat does this code print?',
    code: 'f = open("fruits.txt", "r")\nf.readline()  # skip first line\nprint(f.readline().strip())\nf.close()',
    options: ["Apple", "Banana", "Cherry", "Apple\\nBanana"],
    correct: 1,
    explanation: 'The first .readline() reads and discards "Apple\\n". The second .readline() reads "Banana\\n", and .strip() gives "Banana".'
  },
  {
    title: "Q7. len() of readlines()",
    desc: 'File data.txt contains:\nRed\\nGreen\\nBlue\\nYellow\n\nWhat does this code print?',
    code: 'f = open("data.txt", "r")\nlines = f.readlines()\nprint(len(lines))\nf.close()',
    options: ["3", "4", "20", "Error"],
    correct: 1,
    explanation: '.readlines() returns a list with one element per line. The file has 4 lines, so len() returns 4.'
  },
  {
    title: "Q8. readlines() Index",
    desc: 'File colours.txt contains:\nRed\\nGreen\\nBlue\n\nWhat does this code print?',
    code: 'f = open("colours.txt", "r")\nlines = f.readlines()\nprint(lines[2].strip())\nf.close()',
    options: ["Red", "Green", "Blue", "Error"],
    correct: 2,
    explanation: 'lines[0] is "Red\\n", lines[1] is "Green\\n", lines[2] is "Blue\\n". Index 2 with .strip() gives "Blue".'
  },
  {
    title: "Q9. Negative Index [-1]",
    desc: 'File animals.txt contains:\nCat\\nDog\\nFish\n\nWhat does this code print?',
    code: 'f = open("animals.txt", "r")\nlines = f.readlines()\nprint(lines[-1].strip())\nf.close()',
    options: ["Cat", "Dog", "Fish", "Error"],
    correct: 2,
    explanation: 'Negative index -1 accesses the last element of the list. The last line is "Fish\\n", and .strip() gives "Fish".'
  },
  {
    title: "Q10. Return Value of .write()",
    desc: "What does this code print?",
    code: 'f = open("out.txt", "w")\nresult = f.write("Hello")\nprint(result)\nf.close()',
    options: ["None", "Hello", "5", "True"],
    correct: 2,
    explanation: '.write() returns the number of characters written. "Hello" has 5 characters, so it returns 5.'
  },
  {
    title: 'Q11. "w" Mode Overwrites',
    desc: 'File data.txt currently contains: Old data\n\nAfter running this code, what does data.txt contain?',
    code: 'f = open("data.txt", "w")\nf.write("New")\nf.close()\n\nf = open("data.txt", "r")\nprint(f.read())\nf.close()',
    options: ["Old data", "Old dataNew", "New", "NewOld data"],
    correct: 2,
    explanation: 'Opening a file in "w" mode erases all existing content before writing. Only "New" remains in the file.'
  },
  {
    title: 'Q12. "a" Mode Appends',
    desc: 'File data.txt currently contains: Hello\n\nWhat does this code print?',
    code: 'f = open("data.txt", "a")\nf.write("World")\nf.close()\n\nf = open("data.txt", "r")\nprint(f.read())\nf.close()',
    options: ["World", "Hello World", "HelloWorld", "Hello\\nWorld"],
    correct: 2,
    explanation: '"a" mode appends to the end of existing content without adding any space or newline. "Hello" + "World" = "HelloWorld".'
  },
  {
    title: "Q13. with Statement Auto-Close",
    desc: "What does this code print?",
    code: 'with open("data.txt", "r") as f:\n    data = f.read()\nprint(f.closed)',
    options: ["False", "True", "None", "Error"],
    correct: 1,
    explanation: 'The with statement automatically closes the file when its block ends. So f.closed is True after the with block.'
  },
  {
    title: "Q14. .closed Before close()",
    desc: "What does this code print?",
    code: 'f = open("data.txt", "r")\nprint(f.closed)\nf.close()',
    options: ["True", "None", "False", "Error"],
    correct: 2,
    explanation: 'The file is still open when we check f.closed, so it returns False. It would be True only after calling f.close().'
  },
  {
    title: "Q15. for line in file",
    desc: 'File data.txt contains:\nAlpha\\nBeta\\nGamma\n\nWhat does this code print?',
    code: 'count = 0\nwith open("data.txt", "r") as f:\n    for line in f:\n        count += 1\nprint(count)',
    options: ["1", "0", "3", "Error"],
    correct: 2,
    explanation: 'Iterating over a file object reads one line at a time. The file has 3 lines, so the loop runs 3 times and count becomes 3.'
  },
  {
    title: "Q16. .split() on CSV Data",
    desc: "What does this code print?",
    code: 'data = "red,green,blue"\nparts = data.split(",")\nprint(parts[1])',
    options: ["red", "green", "blue", "red,green,blue"],
    correct: 1,
    explanation: '.split(",") creates ["red", "green", "blue"]. Index [1] is the second element: "green".'
  },
  {
    title: "Q17. strip + split Combo",
    desc: 'A line read from a CSV file is: "  Alice, 85  \\n"\n\nWhat does this code print?',
    code: 'line = "  Alice, 85  \\n"\nresult = line.strip().split(", ")[0]\nprint(result)',
    options: ["  Alice", "Alice, 85", "Alice", "85"],
    correct: 2,
    explanation: '.strip() removes leading/trailing whitespace and \\n, giving "Alice, 85". Then .split(", ") gives ["Alice", "85"], and [0] is "Alice".'
  },
  {
    title: 'Q18. Write in "r" Mode',
    desc: 'File data.txt exists and contains: Hello\n\nWhat happens when this code runs?',
    code: 'f = open("data.txt", "r")\nf.write("test")\nf.close()',
    options: ["Prints test", "File contains test", "File contains Hellotest", "Error"],
    correct: 3,
    explanation: 'You cannot write to a file opened in "r" (read) mode. Python raises an io.UnsupportedOperation error.'
  },
  {
    title: "Q19. .writelines()",
    desc: "After running this code, what does data.txt contain?",
    code: 'f = open("data.txt", "w")\nf.writelines(["A", "B", "C"])\nf.close()\n\nf = open("data.txt", "r")\nprint(f.read())\nf.close()',
    options: ["A\\nB\\nC", "ABC", "['A', 'B', 'C']", "A B C"],
    correct: 1,
    explanation: '.writelines() writes each string in the list consecutively without adding newlines. So the file contains "ABC".'
  },
  {
    title: "Q20. Empty File Length",
    desc: "What does this code print?",
    code: '# Create an empty file\nf = open("empty.txt", "w")\nf.close()\n\n# Read it back\nf = open("empty.txt", "r")\ndata = f.read()\nprint(len(data))\nf.close()',
    options: ["Error", "None", "1", "0"],
    correct: 3,
    explanation: 'Opening in "w" mode and immediately closing creates an empty file. Reading it returns an empty string "", and len("") is 0.'
  }
];

/* ============================================
   STATE
   ============================================ */
let current = 0;
let score = 0;
let selected = -1;
let locked = false;
let completed = JSON.parse(localStorage.getItem('spotOutputFileCompleted') || '[]');
let bestScore = parseInt(localStorage.getItem('spotOutputFileBest') || '0', 10);

/* ============================================
   SYNTAX HIGHLIGHTING
   ============================================ */
function highlight(code) {
  let s = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Comments
  s = s.replace(/(#.*)/g, '<span class="cm">$1</span>');

  // Strings (double then single quotes)
  s = s.replace(/("(?:[^"\\]|\\.)*")/g, '<span class="str">$1</span>');
  s = s.replace(/('(?:[^'\\]|\\.)*')/g, '<span class="str">$1</span>');

  // Numbers (standalone)
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');

  // Keywords
  const kws = ['print', 'if', 'elif', 'else', 'for', 'while', 'def', 'return', 'import', 'from', 'in', 'not', 'and', 'or', 'True', 'False', 'None', 'with', 'as', 'open', 'try', 'except'];
  kws.forEach(k => {
    s = s.replace(new RegExp('\\b(' + k + ')\\b', 'g'), '<span class="kw">$1</span>');
  });

  // Methods (dot-prefixed)
  s = s.replace(/\.(\w+)\(/g, '.<span class="fn">$1</span>(');

  // Built-in functions
  const fns = ['len', 'str', 'int', 'float', 'input', 'range', 'type'];
  fns.forEach(f => {
    s = s.replace(new RegExp('\\b(' + f + ')\\(', 'g'), '<span class="fn">$1</span>(');
  });

  return s;
}

/* ============================================
   RENDER
   ============================================ */
function buildNav() {
  const nav = document.getElementById('challengeNav');
  nav.innerHTML = '';
  questions.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === current ? ' active' : '');
    btn.textContent = i + 1;
    if (completed.includes(i)) {
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = '\u2713';
      btn.appendChild(badge);
    }
    btn.addEventListener('click', () => {
      if (!locked) { current = i; loadQuestion(); }
    });
    nav.appendChild(btn);
  });
}

function loadQuestion() {
  locked = false;
  selected = -1;
  const q = questions[current];

  document.getElementById('qTitle').textContent = q.title;
  document.getElementById('qDesc').textContent = q.desc;
  document.getElementById('questionNum').textContent = (current + 1) + '/' + questions.length;
  document.getElementById('totalScore').textContent = score;
  document.getElementById('feedbackArea').innerHTML = '';
  document.getElementById('btnNext').classList.remove('visible');
  document.getElementById('btnSubmit').disabled = true;
  document.getElementById('questionArea').classList.remove('hidden');
  document.getElementById('resultsArea').classList.add('hidden');

  // Best score display
  const bestBar = document.getElementById('bestScoreBar');
  if (bestScore > 0) {
    bestBar.innerHTML = 'Best score: <strong>' + bestScore + ' / 20</strong>';
  } else {
    bestBar.innerHTML = '';
  }

  // Code area with syntax highlighting
  document.getElementById('codeArea').innerHTML = highlight(q.code);

  // Options
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectOption(i));
    grid.appendChild(btn);
  });

  buildNav();
}

function selectOption(idx) {
  if (locked) return;
  selected = idx;
  document.getElementById('btnSubmit').disabled = false;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
}

function submitAnswer() {
  if (locked || selected === -1) return;
  locked = true;

  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');

  btns.forEach((b, i) => {
    b.classList.add('locked');
    b.classList.remove('selected');
    if (i === q.correct) {
      b.classList.add('correct');
    } else if (i === selected && i !== q.correct) {
      b.classList.add('wrong');
    }
  });

  const fb = document.getElementById('feedbackArea');
  if (selected === q.correct) {
    score++;
    if (!completed.includes(current)) completed.push(current);
    localStorage.setItem('spotOutputFileCompleted', JSON.stringify(completed));
    fb.innerHTML = '<div class="feedback success">Correct! ' + q.explanation + '</div>';
  } else {
    fb.innerHTML = '<div class="feedback error">Not quite. ' + q.explanation + '</div>';
  }

  document.getElementById('totalScore').textContent = score;
  document.getElementById('btnSubmit').disabled = true;
  buildNav();

  if (current < questions.length - 1) {
    document.getElementById('btnNext').classList.add('visible');
  } else {
    setTimeout(showResults, 1500);
  }
}

function nextQuestion() {
  current++;
  loadQuestion();
}

function showResults() {
  document.getElementById('questionArea').classList.add('hidden');
  document.getElementById('resultsArea').classList.remove('hidden');

  document.getElementById('finalScore').textContent = score + '/' + questions.length;

  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('spotOutputFileBest', bestScore.toString());
  }

  let label = '';
  const pct = score / questions.length;
  if (pct === 1) label = 'Perfect score! You know your file handling inside out!';
  else if (pct >= 0.8) label = 'Excellent! Nearly there \u2014 review the ones you missed.';
  else if (pct >= 0.6) label = 'Good effort! Revisit the file handling methods.';
  else label = 'Keep practising! Go through the file handling notes and try again.';

  document.getElementById('finalLabel').textContent = label;
}

function restartAll() {
  current = 0;
  score = 0;
  completed = [];
  localStorage.removeItem('spotOutputFileCompleted');
  loadQuestion();
}

/* ============================================
   EVENT LISTENERS
   ============================================ */
document.getElementById('btnSubmit').addEventListener('click', submitAnswer);
document.getElementById('btnNext').addEventListener('click', nextQuestion);
document.getElementById('btnRestart').addEventListener('click', restartAll);

/* ============================================
   INIT
   ============================================ */
loadQuestion();
</script>
