<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HV & Algorithms — Card Demo</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0;
  padding: 20px;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1b7a3d 0%, #0f5c2a 40%, #0a4620 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
h1 {
  font-size: 3rem;
  font-weight: 900;
  text-align: center;
  margin: 10px 0 6px 0;
  color: #fff;
  text-shadow: 0 3px 8px rgba(0,0,0,0.3);
  letter-spacing: 1px;
}
.subtitle {
  text-align: center;
  font-size: 1.1rem;
  color: rgba(255,255,255,0.75);
  margin: 0 0 30px 0;
  font-weight: 400;
}
#card-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 16px;
  max-width: 1400px;
  padding: 20px;
  min-height: 170px;
}
.card {
  width: 110px;
  height: 150px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  font-weight: 800;
  cursor: pointer;
  user-select: none;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  position: relative;
  border: 4px solid rgba(255,255,255,0.25);
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.35);
}
.card:active {
  transform: translateY(-1px);
}
.card.face-down {
  background: linear-gradient(145deg, #d32f2f, #b71c1c);
  color: rgba(255,255,255,0.85);
  box-shadow: 0 6px 18px rgba(0,0,0,0.3);
}
.card.face-up {
  background: #fff;
  color: #b71c1c;
  box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  border-color: #d32f2f;
}
.card.sortable-ghost {
  opacity: 0.4;
}
.card.sortable-chosen {
  box-shadow: 0 12px 30px rgba(0,0,0,0.5);
  transform: scale(1.08);
}
.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  margin-top: 30px;
  max-width: 700px;
}
.btn {
  padding: 14px 28px;
  font-family: 'Poppins', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.3);
}
.btn:active {
  transform: translateY(0);
}
.btn-shuffle  { background: linear-gradient(135deg, #f57c00, #e65100); }
.btn-reveal   { background: linear-gradient(135deg, #1976d2, #0d47a1); }
.btn-hide     { background: linear-gradient(135deg, #7b1fa2, #4a148c); }
.btn-sort     { background: linear-gradient(135deg, #00897b, #004d40); }
.btn-reset    { background: linear-gradient(135deg, #546e7a, #37474f); }
.btn-target   { background: linear-gradient(135deg, #e91e63, #880e4f); }
#target-display {
  margin-top: 24px;
  font-size: 2.2rem;
  font-weight: 800;
  color: #fff;
  background: rgba(0,0,0,0.3);
  padding: 14px 40px;
  border-radius: 12px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.3);
  min-height: 64px;
  display: none;
  align-items: center;
  justify-content: center;
}
#target-display.visible {
  display: flex;
}
</style>
</head>
<body>

<h1>HV &amp; Algorithms</h1>
<p class="subtitle">Click a card to flip &bull; Drag to reorder</p>

<div id="card-container"></div>

<div class="controls">
  <button class="btn btn-shuffle" onclick="shuffle()">Shuffle</button>
  <button class="btn btn-reveal" onclick="revealAll()">Reveal All</button>
  <button class="btn btn-hide" onclick="hideAll()">Hide All</button>
  <button class="btn btn-sort" onclick="sortCards()">Sort (1-10)</button>
  <button class="btn btn-reset" onclick="reset()">Reset</button>
  <button class="btn btn-target" onclick="generateTarget()">Target</button>
</div>

<div id="target-display"></div>

<script>
const container = document.getElementById('card-container');
const TOTAL = 10;

function createCards(numbers) {
  container.innerHTML = '';
  numbers.forEach(n => {
    const card = document.createElement('div');
    card.className = 'card face-down';
    card.dataset.value = n;
    card.textContent = '?';
    card.addEventListener('click', () => flipCard(card));
    container.appendChild(card);
  });
}

function flipCard(card) {
  if (card.classList.contains('face-down')) {
    card.classList.remove('face-down');
    card.classList.add('face-up');
    card.textContent = card.dataset.value;
  } else {
    card.classList.remove('face-up');
    card.classList.add('face-down');
    card.textContent = '?';
  }
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getNumbers() {
  return Array.from(container.children).map(c => parseInt(c.dataset.value));
}

function shuffle() {
  const nums = getNumbers();
  shuffleArray(nums);
  createCards(nums);
  initSortable();
}

function revealAll() {
  container.querySelectorAll('.card').forEach(card => {
    card.classList.remove('face-down');
    card.classList.add('face-up');
    card.textContent = card.dataset.value;
  });
}

function hideAll() {
  container.querySelectorAll('.card').forEach(card => {
    card.classList.remove('face-up');
    card.classList.add('face-down');
    card.textContent = '?';
  });
}

function sortCards() {
  const nums = getNumbers();
  nums.sort((a, b) => a - b);
  createCards(nums);
  revealAll();
  initSortable();
}

function reset() {
  const nums = shuffleArray([...Array(TOTAL)].map((_, i) => i + 1));
  createCards(nums);
  initSortable();
}

function initSortable() {
  Sortable.create(container, {
    animation: 200,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
  });
}

function generateTarget() {
  const display = document.getElementById('target-display');
  // ~70% chance in range (1-10), ~30% chance outside (e.g. -5 to 0 or 11 to 20)
  let num;
  if (Math.random() < 0.7) {
    num = Math.floor(Math.random() * 10) + 1;
  } else {
    if (Math.random() < 0.5) {
      num = Math.floor(Math.random() * 6) - 5; // -5 to 0
    } else {
      num = Math.floor(Math.random() * 10) + 11; // 11 to 20
    }
  }
  display.classList.add('visible');
  display.textContent = 'Target: ' + num;
}

// Initial load
reset();
</script>
</body>
</html>
