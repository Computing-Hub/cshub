<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Puzzles — Edexcel GCSE CS</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #181c27;
  --surface2: #1e2333;
  --border: #2a3050;
  --l1: #3ecf8e;   /* green - level 1 */
  --l2: #f5a623;   /* amber - level 2 */
  --l3: #e84393;   /* pink  - level 3 */
  --text: #e8eaf6;
  --muted: #6b7399;
  --mono: 'Fira Code', monospace;
  --sans: 'Outfit', sans-serif;
  --radius: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 0%, rgba(62,207,142,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 90% 100%, rgba(232,67,147,0.06) 0%, transparent 60%);
  font-family: var(--sans);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(24,28,39,0.9);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-size: 1.25rem; font-weight: 900; letter-spacing: -0.03em; }
.logo .py { color: var(--l1); }
.logo .pz { color: var(--l2); }
.logo .sub { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-left: 10px; vertical-align: middle; }

.hdr-right { display: flex; align-items: center; gap: 16px; }
.global-score {
  font-family: var(--mono);
  font-size: 0.82rem;
  color: var(--muted);
}
.global-score span { color: var(--l1); font-weight: 600; }

.btn-reset {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 14px;
  border-radius: 20px;
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-reset:hover { border-color: var(--l3); color: var(--l3); }

/* ── LEVEL SELECTOR ── */
.level-nav {
  display: flex;
  gap: 0;
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  overflow-x: auto;
}

.level-btn {
  padding: 16px 32px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  font-family: var(--sans);
  font-weight: 700;
  font-size: 0.88rem;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
  position: relative;
}
.level-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.level-btn.l1.active, .level-btn.l1:not(:disabled):hover { color: var(--l1); border-bottom-color: var(--l1); }
.level-btn.l2.active, .level-btn.l2:not(:disabled):hover { color: var(--l2); border-bottom-color: var(--l2); }
.level-btn.l3.active, .level-btn.l3:not(:disabled):hover { color: var(--l3); border-bottom-color: var(--l3); }

.level-badge {
  font-size: 0.62rem;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 20px;
  background: var(--border);
  color: var(--muted);
}
.level-btn.l1.active .level-badge { background: rgba(62,207,142,0.15); color: var(--l1); }
.level-btn.l2.active .level-badge { background: rgba(245,166,35,0.15); color: var(--l2); }
.level-btn.l3.active .level-badge { background: rgba(232,67,147,0.15); color: var(--l3); }

.lock-icon { font-size: 0.8rem; }

/* ── PUZZLE TABS ── */
.puzzle-nav {
  display: flex;
  gap: 6px;
  padding: 14px 32px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.puzzle-tab {
  padding: 8px 18px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--sans);
  font-weight: 700;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.puzzle-tab:hover { border-color: currentColor; }
.puzzle-tab.active { color: #fff; }
.puzzle-tab.done { opacity: 0.7; }
.puzzle-tab.done::after { content: ' ✓'; font-size: 0.75rem; }

/* Level colour theming for active tabs */
.lv1 .puzzle-tab.active { background: rgba(62,207,142,0.15); border-color: var(--l1); color: var(--l1); }
.lv2 .puzzle-tab.active { background: rgba(245,166,35,0.15); border-color: var(--l2); color: var(--l2); }
.lv3 .puzzle-tab.active { background: rgba(232,67,147,0.15); border-color: var(--l3); color: var(--l3); }

/* ── MAIN CONTENT ── */
main { flex: 1; padding: 28px 32px; max-width: 960px; margin: 0 auto; width: 100%; }

/* Level locked overlay */
.locked-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 320px;
  gap: 16px;
  text-align: center;
}
.locked-icon { font-size: 3.5rem; opacity: 0.4; }
.locked-screen h2 { font-size: 1.4rem; font-weight: 800; color: var(--muted); }
.locked-screen p { font-size: 0.9rem; color: var(--muted); max-width: 360px; }

/* ── PUZZLE CARD ── */
.puzzle-card { display: none; }
.puzzle-card.active { display: block; }

.puzzle-header {
  margin-bottom: 20px;
}
.puzzle-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.topic-tag {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
}
.lv1 .topic-tag { color: var(--l1); border-color: rgba(62,207,142,0.3); }
.lv2 .topic-tag { color: var(--l2); border-color: rgba(245,166,35,0.3); }
.lv3 .topic-tag { color: var(--l3); border-color: rgba(232,67,147,0.3); }

.puzzle-title {
  font-size: 1.25rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.puzzle-desc {
  font-size: 0.875rem;
  color: var(--muted);
  line-height: 1.6;
}

/* ── PARSONS AREA ── */
.parsons-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 20px;
}

.parsons-col-label {
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.piece-bank, .answer-zone {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: background 0.15s;
}
.answer-zone.drag-over { background: var(--surface2); border-color: var(--muted); }

.code-piece {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 9px 14px;
  font-family: var(--mono);
  font-size: 0.8rem;
  line-height: 1.5;
  cursor: grab;
  user-select: none;
  white-space: pre-wrap;
  word-break: break-all;
  overflow: visible;
  font-variant-ligatures: none;
  font-feature-settings: "liga" 0, "calt" 0;
  transition: all 0.15s;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  position: relative;
}
.code-piece:hover { border-color: var(--muted); transform: translateX(2px); }
.code-piece.dragging { opacity: 0.3; cursor: grabbing; }
.code-piece.correct { border-color: var(--l1) !important; background: rgba(62,207,142,0.07) !important; }
.code-piece.wrong   { border-color: #e84040 !important; background: rgba(232,64,64,0.07) !important; }

.drag-handle { color: var(--border); font-size: 0.7rem; padding-top: 2px; flex-shrink: 0; }

/* indent control */
.indent-btns {
  display: flex;
  gap: 3px;
  margin-left: auto;
  flex-shrink: 0;
}
.indent-btn {
  background: var(--border);
  border: none;
  color: var(--muted);
  width: 20px;
  height: 20px;
  border-radius: 4px;
  font-size: 0.7rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.indent-btn:hover { background: var(--muted); color: var(--text); }

.piece-code { flex: 1; font-variant-ligatures: none; font-feature-settings: "liga" 0, "calt" 0; }

/* empty state inside zones */
.zone-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  min-height: 80px;
  color: var(--border);
  font-size: 0.78rem;
  font-family: var(--mono);
  pointer-events: none;
  text-align: center;
}

/* ── CONTROLS BAR ── */
.controls-bar {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.btn {
  padding: 9px 22px;
  border-radius: 8px;
  font-family: var(--sans);
  font-weight: 700;
  font-size: 0.84rem;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-check  { background: var(--l1); color: #000; }
.btn-check:hover  { filter: brightness(1.1); transform: translateY(-1px); }
.btn-shuffle { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-shuffle:hover { border-color: var(--muted); }
.btn-hint   { background: var(--surface2); color: var(--l2); border: 1px solid rgba(245,166,35,0.3); }
.btn-hint:hover { border-color: var(--l2); }

.lv2 .btn-check { background: var(--l2); color: #000; }
.lv3 .btn-check { background: var(--l3); color: #fff; }

.feedback-msg {
  font-size: 0.85rem;
  font-weight: 700;
  padding: 8px 16px;
  border-radius: 8px;
  display: none;
}
.feedback-msg.show { display: block; }
.feedback-msg.ok { background: rgba(62,207,142,0.12); color: var(--l1); border: 1px solid rgba(62,207,142,0.3); }
.feedback-msg.fail { background: rgba(232,64,64,0.1); color: #f06060; border: 1px solid rgba(232,64,64,0.2); }

/* ── HINT ── */
.hint-box {
  display: none;
  background: rgba(245,166,35,0.06);
  border: 1px solid rgba(245,166,35,0.25);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 0.83rem;
  color: #f5c060;
  line-height: 1.6;
  margin-top: 12px;
}
.hint-box.show { display: block; }

/* ── COMPLETION BANNER ── */
.level-complete {
  display: none;
  background: linear-gradient(135deg, rgba(62,207,142,0.12), rgba(62,207,142,0.04));
  border: 1px solid rgba(62,207,142,0.35);
  border-radius: 14px;
  padding: 28px 32px;
  text-align: center;
  margin-top: 24px;
  animation: pop 0.4s ease;
}
.level-complete.show { display: block; }
@keyframes pop { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.level-complete h2 { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
.level-complete p { color: var(--muted); font-size: 0.9rem; margin-bottom: 16px; }
.btn-next-level {
  background: var(--l1);
  color: #000;
  padding: 12px 30px;
  border-radius: 8px;
  font-family: var(--sans);
  font-weight: 800;
  font-size: 0.95rem;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}
.btn-next-level:hover { filter: brightness(1.1); transform: translateY(-2px); }

/* ── PROGRESS DOTS ── */
.progress-dots {
  display: flex;
  gap: 6px;
  margin-left: auto;
}
.dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.3s;
}
.dot.done { background: var(--l1); }
.lv2 .dot.done { background: var(--l2); }
.lv3 .dot.done { background: var(--l3); }

/* ── SYNTAX COLOURS ── */
.kw { color: #c792ea; }
.bi { color: #82aaff; }
.st { color: #c3e88d; }
.nm { color: #f78c6c; }
.cm { color: #546e7a; font-style: italic; }
.op { color: #89ddff; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 680px) {
  .parsons-layout { grid-template-columns: 1fr; }
  header { padding: 14px 18px; }
  main { padding: 18px; }
  .level-nav, .puzzle-nav { padding-left: 18px; padding-right: 18px; }
}
.btn-solution { background: #6a3de8; color: #fff; border: 1px solid #8860ff; }
.btn-solution:hover { background: #7c52f0; transform: translateY(-1px); }
@keyframes fadeIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }

/* ══ THEORY ACTIVITIES ══ */
.theory-wrap { padding: 8px 0; }

/* Match activity */
.match-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 12px;
}
.match-col-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.match-terms { display: flex; flex-direction: column; gap: 8px; }
.match-term {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 0.83rem;
  font-weight: 700;
  color: var(--text);
  min-height: 52px;
  display: flex;
  align-items: center;
  position: relative;
}
.match-term.matched-ok  { border-color: var(--l1); background: rgba(62,207,142,0.08); }
.match-term.matched-ok::after  { content: '✓'; position: absolute; right: 12px; color: var(--l1); font-size: 1rem; }
.match-term.matched-bad { border-color: #f87171; background: rgba(248,113,113,0.08); }
.match-term.matched-bad::after { content: '✗'; position: absolute; right: 12px; color: #f87171; font-size: 1rem; }
.match-term.has-drop { border-color: var(--l2); }
.match-term.drag-over-term { border-color: var(--l3); background: rgba(240,130,200,0.08); border-style: dashed; }

.match-defs { display: flex; flex-direction: column; gap: 8px; }
.def-card {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 11px 14px;
  font-size: 0.78rem;
  color: var(--text);
  line-height: 1.5;
  cursor: grab;
  user-select: none;
  transition: all 0.15s;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.def-card::before { content: '⠿'; color: var(--muted); flex-shrink: 0; margin-top: 1px; }
.def-card:hover { border-color: var(--l3); color: var(--text); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(240,130,200,0.15); }
.def-card.dragging { opacity: 0.35; }
.def-card.placed { display: none; }

/* dropped label inside term */
.dropped-label {
  font-size: 0.73rem;
  color: var(--muted);
  font-weight: 400;
  font-style: italic;
  margin-left: 8px;
  flex: 1;
  line-height: 1.4;
}

/* Conversion activity */
.conv-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 12px;
}
.conv-card {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.conv-type {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
}
.conv-type.hex-type  { color: #60a5fa; }
.conv-type.twos-type { color: var(--l3); }
.conv-question {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.12em;
}
.conv-input-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.conv-label { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
.conv-input {
  font-family: var(--mono);
  font-size: 0.88rem;
  font-weight: 700;
  padding: 6px 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  width: 110px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  outline: none;
}
.conv-input:focus { border-color: var(--l3); }
.conv-input.correct { border-color: var(--l1); background: rgba(62,207,142,0.08); color: var(--l1); }
.conv-input.wrong   { border-color: #f87171; background: rgba(248,113,113,0.08); color: #f87171; }
.conv-card.correct-card { border-color: var(--l1); }
.conv-card.wrong-card   { border-color: rgba(248,113,113,0.4); }

@media (max-width: 680px) {
  .match-layout { grid-template-columns: 1fr; }
  .conv-grid { grid-template-columns: 1fr; }
}

/* ── LEVEL 4 TURTLE ── */
:root { --l4: #38bdf8; }
.level-btn.l4.active, .level-btn.l4:not(:disabled):hover { color: var(--l4); border-bottom-color: var(--l4); }
.level-btn.l4.active .level-badge { background: rgba(56,189,248,0.15); color: var(--l4); }
.lv4 .puzzle-tab.active { background: rgba(56,189,248,0.15); border-color: var(--l4); color: var(--l4); }
.lv4 .puzzle-tab.done   { border-color: rgba(56,189,248,0.4); }
.lv4 .dot.done          { background: var(--l4); }
.lv4 .topic-tag         { background: rgba(56,189,248,0.12); color: var(--l4); border: 1px solid rgba(56,189,248,0.25); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="py">Py</span><span class="pz">Puzzles</span>
    <span class="sub">Edexcel GCSE CS</span>
  </div>
  <div class="hdr-right">
    <div class="global-score">Total solved: <span id="totalSolved">0</span> / <span id="totalPuzzles">15</span></div>
    <button class="btn-reset" onclick="confirmReset()">↺ Reset progress</button>
  </div>
</header>

<!-- Level nav -->
<nav class="level-nav" id="levelNav">
  <button class="level-btn l1 active" onclick="selectLevel(0)" id="lvBtn0">
    🟢 <span>Level 1</span>
    <span class="level-badge">Foundations</span>
  </button>
  <button class="level-btn l2" onclick="selectLevel(1)" id="lvBtn1">
    🟡 <span>Level 2</span>
    <span class="level-badge">Intermediate</span>
    
  </button>
  <button class="level-btn l3" onclick="selectLevel(2)" id="lvBtn2">
    🔴 <span>Level 3</span>
    <span class="level-badge">Advanced</span>
  </button>
  <button class="level-btn l4" onclick="selectLevel(3)" id="lvBtn3">
    🐢 <span>Level 4</span>
    <span class="level-badge">Turtle</span>
  </button>
</nav>

<!-- Puzzle tabs -->
<div class="puzzle-nav lv1" id="puzzleNav"></div>

<!-- Main -->
<main id="mainArea"></main>

<script>
// ════════════════════════════════════════════════════
//  PUZZLE DATA — 15 Edexcel-aligned Python puzzles
// ════════════════════════════════════════════════════
const LEVELS = [
  {
    name: "Level 1", cls: "lv1", color: "var(--l1)",
    puzzles: [
      {
        title: "Square Perimeter",
        topic: "Functions & Input",
        desc: "A function that takes a side length and prints the perimeter of a square. Assemble the lines in the correct order.",
        hint: "Remember: define the function first, then call it. The perimeter = side × 4.",
        lines: [
          "def square(side):",
          "    perimeter = side * 4",
          "    print(\"The perimeter is\", perimeter)",
          "side = int(input(\"Enter the side length: \"))",
          "square(side)"
        ]
      },
      {
        title: "Grade Checker",
        topic: "Selection",
        desc: "Read a student's score and print their grade using if/elif/else. Edexcel uses selection as a key programming concept.",
        hint: "Start with if, then elif for each boundary, then else for the catch-all.",
        lines: [
          "score = int(input(\"Enter your score: \"))",
          "if score >= 70:",
          "    print(\"Grade: A\")",
          "elif score >= 55:",
          "    print(\"Grade: B\")",
          "elif score >= 40:",
          "    print(\"Grade: C\")",
          "else:",
          "    print(\"Grade: U\")"
        ]

//  STATE & STORAGE
// ════════════════════════════════════════════════════
const STORAGE_KEY = 'pypuzzles_progress_v1';

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { solved: [] };
  } catch { return { solved: [] }; }
}

function saveProgress(prog) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(prog));
}

function isSolved(lvl, pzl) {
  return loadProgress().solved.includes(`${lvl}-${pzl}`);
}

function markSolved(lvl, pzl) {
  const prog = loadProgress();
  const key = `${lvl}-${pzl}`;
  if (!prog.solved.includes(key)) prog.solved.push(key);
  saveProgress(prog);
}

function levelComplete(lvl) {
  return LEVELS[lvl].puzzles.every((_, i) => isSolved(lvl, i));
}

function confirmReset() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

// Format: { bank: [indices...], answer: [indices...] }

function getPieceStateKey() { return `${curLevel}-${curPuzzle}`; }

function initPieceState(lvl, pzl) {
  const key = `${lvl}-${pzl}`;
  if (!pieceState[key]) {
    const n = LEVELS[lvl].puzzles[pzl].lines.length;
    const shuffled = [...Array(n).keys()].sort(() => Math.random() - 0.5);
    pieceState[key] = { bank: shuffled, answer: [], indents: Array(n).fill(0) };
  }
}

// ════════════════════════════════════════════════════
//  SYNTAX HIGHLIGHT
// ════════════════════════════════════════════════════

function hl(code) {
  const KW = new Set(['def','class','if','elif','else','for','while','return','import','from','in','not','and','or','is','True','False','None','try','except','finally','with','as','pass','break','continue','lambda','yield','global','nonlocal','del','raise','assert']);
  const BI = new Set(['print','input','int','float','str','list','dict','set','len','range','type','sum','min','max','abs','round','enumerate','zip','sorted','open','append','chr','ord']);
  const OPS2 = new Set(['!=','==','<=','>=','+=','-=','*=','//']);
  const out = [];
  let i = 0;
  const span = (cls, txt) => `<span class="${cls}">${txt}</span>`;
  const esc  = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  while (i < code.length) {
    if (code[i] === '#') {
      let j = i; while (j < code.length && code[j] !== '\n') j++;
      out.push(span('cm', esc(code.slice(i,j)))); i = j; continue;
    }
    if (code[i] === '"' || code[i] === "'") {
      const q = code[i]; let j = i+1;
      while (j < code.length && code[j] !== q) { if (code[j]==='\\') j++; j++; }
      j++;
      out.push(span('st', esc(code.slice(i,j)))); i = j; continue;
    }
    const two = code.slice(i,i+2);
    if (OPS2.has(two)) { out.push(span('op', esc(two))); i+=2; continue; }
    if ('<>=!'.includes(code[i])) { out.push(span('op', esc(code[i]))); i++; continue; }
    if (/[a-zA-Z_]/.test(code[i])) {
      let j = i; while (j < code.length && /\w/.test(code[j])) j++;
      const w = code.slice(i,j);
      if (KW.has(w))      out.push(span('kw', w));
      else if (BI.has(w)) out.push(span('bi', w));
      else                out.push(w);
      i = j; continue;
    }
    if (/[0-9]/.test(code[i])) {
      let j = i; while (j < code.length && /[0-9.]/.test(code[j])) j++;
      out.push(span('nm', code.slice(i,j))); i = j; continue;
    }
    out.push(esc(code[i])); i++;
  }
  return out.join('');
}

// ════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════
function render() {
  renderLevelButtons();
  renderPuzzleTabs();
  renderMainArea();
  updateTotalScore();
}

function renderLevelButtons() {
  LEVELS.forEach((lv, i) => {
    const btn = document.getElementById(`lvBtn${i}`);
    if (!btn) return;
    btn.classList.toggle('active', i === curLevel);
    btn.disabled = false;
    const badge = btn.querySelector('.level-badge');
    if (badge && levelComplete(i)) badge.textContent = '✅ Done';
  });
  // Update total puzzle count
  const totalEl = document.getElementById('totalPuzzles');
  if (totalEl) {
    const total = LEVELS.reduce((s, lv) => s + lv.puzzles.length, 0);
    totalEl.textContent = total;
  }
}

function renderPuzzleTabs() {
  const nav = document.getElementById('puzzleNav');
  nav.className = `puzzle-nav ${LEVELS[curLevel].cls}`;
  nav.innerHTML = '';
  LEVELS[curLevel].puzzles.forEach((pz, i) => {
    const btn = document.createElement('button');
    btn.className = 'puzzle-tab' +
      (i === curPuzzle ? ' active' : '') +
      (isSolved(curLevel, i) ? ' done' : '');
    btn.textContent = `${i + 1}. ${pz.title}`;
    btn.onclick = () => selectPuzzle(i);
    nav.appendChild(btn);
  });
}

function renderMainArea() {
  const main = document.getElementById('mainArea');
  const lv = LEVELS[curLevel];
  const pz = lv.puzzles[curPuzzle];
  const solved = isSolved(curLevel, curPuzzle);
  main.className = lv.cls;

  const pzType = pz.type || 'parsons';

  if (pzType === 'match') {
    renderMatchActivity(main, lv, pz, solved);
  } else if (pzType === 'conversion') {
    renderConversionActivity(main, lv, pz, solved);
  } else {
    renderParsonsActivity(main, lv, pz, solved);
  }
}

// ── shared header builder ──
function buildHeader(lv, pz) {
  const maxLevel = LEVELS.length - 1;
  const completionMsg = curLevel < maxLevel
    ? 'Level complete! Move on to Level ' + (curLevel + 2) + '.'
    : 'Amazing — you\'ve completed all levels!';
  const completionBtn = curLevel < maxLevel
    ? `<button class="btn-next-level" onclick="selectLevel(${curLevel + 1})">Go to Level ${curLevel + 2} →</button>`
    : '<p style="color:var(--l4);font-weight:700;font-size:1rem;">🏆 All levels done — brilliant work!</p>';
  return `
    <div class="puzzle-header">
      <div class="puzzle-meta">
        <span class="topic-tag">${pz.topic}</span>
        <div class="progress-dots" id="progressDots"></div>
      </div>
      <div class="puzzle-title">${pz.title}</div>
      <div class="puzzle-desc">${pz.desc}</div>
    </div>
    <div class="level-complete" id="levelComplete">
      <h2>🎉 Level ${curLevel + 1} Complete!</h2>
      <p>${completionMsg}</p>
      ${completionBtn}
    </div>
  `;
}

function buildProgressDots(lv) {
  const dots = document.getElementById('progressDots');
  if (!dots) return;
  lv.puzzles.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (isSolved(curLevel, i) ? ' done' : '');
    dots.appendChild(d);
  });
}

        <div>
          <div class="match-col-label">🏷 Terms — drop a description here</div>
          <div class="match-terms" id="matchTerms"></div>
        </div>
        <div>
          <div class="match-col-label">📄 Descriptions — drag to the correct term</div>
          <div class="match-defs" id="matchDefs"></div>
        </div>
      </div>
    </div>
    <div class="controls-bar" style="margin-top:16px;">
      <button class="btn btn-check" onclick="checkMatchAnswer()">✔ Check Answer</button>
      <button class="btn btn-shuffle" onclick="resetMatch()">⟳ Reset</button>
      <button class="btn btn-hint" onclick="toggleHint()">💡 Hint</button>
      <div class="feedback-msg" id="feedbackMsg"></div>
    </div>
    <div class="hint-box" id="hintBox">${pz.hint}</div>
  `;

  buildProgressDots(lv);
  populateMatch(pz, key);
  if (levelComplete(curLevel)) document.getElementById('levelComplete').classList.add('show');
}

function populateMatch(pz, key) {
  const termsEl = document.getElementById('matchTerms');
  const defsEl  = document.getElementById('matchDefs');
  if (!termsEl || !defsEl) return;

  termsEl.innerHTML = '';
  defsEl.innerHTML  = '';

  const state = matchState[key];
  const defOrder = state._defOrder || pz.pairs.map((_,i) => i);

  // Render terms with their matched def (if any)
  pz.pairs.forEach((pair, ti) => {
    const termDiv = document.createElement('div');
    termDiv.className = 'match-term';
    termDiv.dataset.termIdx = ti;

    const matchedDefIdx = state[ti];
    if (matchedDefIdx !== null && matchedDefIdx !== undefined) {
      termDiv.innerHTML = `<strong>${pair.term}</strong><span class="dropped-label">${pz.pairs[matchedDefIdx].def}</span>`;
      termDiv.classList.add('has-drop');
    } else {
      termDiv.innerHTML = `<strong>${pair.term}</strong>`;
    }

    termDiv.addEventListener('dragover', e => { e.preventDefault(); termDiv.classList.add('drag-over-term'); });
    termDiv.addEventListener('dragleave', () => termDiv.classList.remove('drag-over-term'));
    termDiv.addEventListener('drop', e => {
      e.preventDefault();
      termDiv.classList.remove('drag-over-term');
      if (matchDragDef === null) return;
      // Remove this def from wherever it was
      Object.keys(state).forEach(k => { if (k !== '_defOrder' && state[k] === matchDragDef) state[k] = null; });
      state[ti] = matchDragDef;
      matchDragDef = null;
      populateMatch(pz, key);
    });

    termsEl.appendChild(termDiv);
  });

  // Render defs — hide placed ones
  const placedDefs = new Set(Object.values(state).filter(v => v !== null && v !== undefined));

  defOrder.forEach(origIdx => {
    const defDiv = document.createElement('div');
    defDiv.className = 'def-card' + (placedDefs.has(origIdx) ? ' placed' : '');
    defDiv.draggable = true;
    defDiv.dataset.defIdx = origIdx;
    defDiv.innerHTML = `<span>${pz.pairs[origIdx].def}</span>`;

    defDiv.addEventListener('dragstart', e => {
      matchDragDef = origIdx;
      setTimeout(() => defDiv.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    defDiv.addEventListener('dragend', () => defDiv.classList.remove('dragging'));

    defsEl.appendChild(defDiv);
  });
}

function checkMatchAnswer() {
  const pz = LEVELS[curLevel].puzzles[curPuzzle];
  const key = `${curLevel}-${curPuzzle}`;
  const state = matchState[key];
  const termsEl = document.getElementById('matchTerms');
  let correct = 0;

  termsEl.querySelectorAll('.match-term').forEach(termDiv => {
    const ti = parseInt(termDiv.dataset.termIdx);
    termDiv.classList.remove('matched-ok', 'matched-bad');
    const matchedDefIdx = state[ti];
    if (matchedDefIdx === null || matchedDefIdx === undefined) return;
    if (matchedDefIdx === ti) {
      termDiv.classList.add('matched-ok');
      correct++;
    } else {
      termDiv.classList.add('matched-bad');
    }
  });

  const total = pz.pairs.length;
  const placed = Object.values(state).filter(v => v !== null && v !== undefined).length;

  const fb = document.getElementById('feedbackMsg');
  if (placed < total) {
    fb.textContent = `⚠ Place all ${total} definitions before checking. (${placed} placed)`;
    fb.className = 'feedback-msg show fail';
    return;
  }

  if (correct === total) {
    fb.textContent = `🎉 Perfect! All ${total} matches correct!`;
    fb.className = 'feedback-msg show ok';
    markSolved(curLevel, curPuzzle);
    renderLevelButtons();
    renderPuzzleTabs();
    updateTotalScore();
    document.querySelectorAll('.dot')[curPuzzle].classList.add('done');
    if (levelComplete(curLevel)) setTimeout(() => document.getElementById('levelComplete').classList.add('show'), 600);
  } else {
    fb.textContent = `${correct}/${total} correct — wrong matches highlighted in red.`;
    fb.className = 'feedback-msg show fail';
  }
}

function resetMatch() {
  const pz = LEVELS[curLevel].puzzles[curPuzzle];
  const key = `${curLevel}-${curPuzzle}`;
  matchState[key] = {};
  pz.pairs.forEach((_, i) => matchState[key][i] = null);
  matchState[key]._defOrder = [...pz.pairs.map((_,i) => i)].sort(() => Math.random() - 0.5);
  document.getElementById('feedbackMsg').className = 'feedback-msg';
  populateMatch(pz, key);
  document.querySelectorAll('.match-term').forEach(t => t.classList.remove('matched-ok','matched-bad'));
}

// ────────────────────────────────────────────────
//  CONVERSION renderer
// ────────────────────────────────────────────────
function renderConversionActivity(main, lv, pz, solved) {
  main.innerHTML = buildHeader(lv, pz) + `
    <div class="theory-wrap">
      <div class="conv-grid" id="convGrid"></div>
    </div>
    <div class="controls-bar" style="margin-top:16px;">
      <button class="btn btn-check" onclick="checkConversions()">✔ Check All</button>
      <button class="btn btn-shuffle" onclick="resetConversions()">⟳ Reset</button>
      <button class="btn btn-hint" onclick="toggleHint()">💡 Hint</button>
      <div class="feedback-msg" id="feedbackMsg"></div>
    </div>
    <div class="hint-box" id="hintBox">${pz.hint}</div>
  `;

  buildProgressDots(lv);

  const grid = document.getElementById('convGrid');
  pz.exercises.forEach((ex, i) => {
    const card = document.createElement('div');
    card.className = 'conv-card';
    card.id = `conv-${i}`;
    const typeLabel = ex.mode === "hex" ? "Binary → Hexadecimal" : "Binary → Two's Complement";
    const typeClass = ex.mode === 'hex' ? 'hex-type' : 'twos-type';
    const placeholder = ex.mode === 'hex' ? 'e.g. A3' : 'e.g. 10110011';
    card.innerHTML = `
      <div class="conv-type ${typeClass}">${typeLabel}</div>
      <div class="conv-question">${ex.q}</div>
      <div class="conv-input-row">
        <span class="conv-label">Answer:</span>
        <input class="conv-input" id="conv-input-${i}" placeholder="${placeholder}" maxlength="8" autocomplete="off" spellcheck="false">
      </div>
    `;
    grid.appendChild(card);
  });

  if (solved) {
    document.getElementById('feedbackMsg').textContent = '✓ Already solved!';
    document.getElementById('feedbackMsg').className = 'feedback-msg show ok';
  }
  if (levelComplete(curLevel)) document.getElementById('levelComplete').classList.add('show');
}

function checkConversions() {
  const pz = LEVELS[curLevel].puzzles[curPuzzle];
  let correct = 0;
  let unanswered = 0;

  pz.exercises.forEach((ex, i) => {
    const inp = document.getElementById(`conv-input-${i}`);
    const card = document.getElementById(`conv-${i}`);
    if (!inp) return;
    const val = inp.value.trim().toUpperCase();
    if (!val) { unanswered++; return; }
    inp.classList.remove('correct', 'wrong');
    card.classList.remove('correct-card', 'wrong-card');
    if (val === ex.a.toUpperCase()) {
      inp.classList.add('correct');
      card.classList.add('correct-card');
      correct++;
    } else {
      inp.classList.add('wrong');
      card.classList.add('wrong-card');
    }
  });

  const total = pz.exercises.length;
  const fb = document.getElementById('feedbackMsg');

  if (unanswered > 0) {
    fb.textContent = `⚠ ${unanswered} question${unanswered > 1 ? 's' : ''} unanswered.`;
    fb.className = 'feedback-msg show fail';
    return;
  }

  if (correct === total) {
    fb.textContent = `🎉 Perfect! All ${total} conversions correct!`;
    fb.className = 'feedback-msg show ok';
    markSolved(curLevel, curPuzzle);
    renderLevelButtons();
    renderPuzzleTabs();
    updateTotalScore();
    document.querySelectorAll('.dot')[curPuzzle].classList.add('done');
    if (levelComplete(curLevel)) setTimeout(() => document.getElementById('levelComplete').classList.add('show'), 600);
  } else {
    fb.textContent = `${correct}/${total} correct — wrong answers highlighted in red.`;
    fb.className = 'feedback-msg show fail';
  }
}

function resetConversions() {
  const pz = LEVELS[curLevel].puzzles[curPuzzle];
  pz.exercises.forEach((_, i) => {
    const inp = document.getElementById(`conv-input-${i}`);
    const card = document.getElementById(`conv-${i}`);
    if (inp) { inp.value = ''; inp.classList.remove('correct','wrong'); }
    if (card) card.classList.remove('correct-card','wrong-card');
  });
  document.getElementById('feedbackMsg').className = 'feedback-msg';
}



function populateZones() {
  const ps = pieceState[getPieceStateKey()];
  const pz = LEVELS[curLevel].puzzles[curPuzzle];
  const bank = document.getElementById('bankZone');
  const answer = document.getElementById('answerZone');

  bank.innerHTML = '';
  answer.innerHTML = '';

  if (ps.bank.length === 0) {
    bank.innerHTML = '<div class="zone-empty">All pieces placed →</div>';
  }
  ps.bank.forEach(idx => bank.appendChild(makePiece(idx, 'bank')));

  if (ps.answer.length === 0) {
    answer.innerHTML = '<div class="zone-empty">← Drag pieces here</div>';
  }
  ps.answer.forEach(idx => answer.appendChild(makePiece(idx, 'answer')));
}

// ════════════════════════════════════════════════════
//  PIECE CREATION
// ════════════════════════════════════════════════════
let dragIdx = null;
let dragFrom = null;

function makePiece(lineIdx, zone) {
  const ps = pieceState[getPieceStateKey()];
  const pz = LEVELS[curLevel].puzzles[curPuzzle];
  const rawLine = pz.lines[lineIdx];

  // Detect natural indent from the line itself
  const naturalSpaces = rawLine.match(/^(\s*)/)[1].length;
  const indentLevel = naturalSpaces / 4;

  const div = document.createElement('div');
  div.className = 'code-piece';
  div.draggable = true;
  div.dataset.lineIdx = lineIdx;
  div.dataset.zone = zone;

  div.style.paddingLeft = `${14 + indentLevel * 20}px`;

  div.innerHTML = `
    <span class="drag-handle">⠿</span>
    <span class="piece-code">${hl(rawLine.trim())}</span>
  `;

  div.addEventListener('dragstart', e => {
    dragIdx = lineIdx;
    dragFrom = zone;
    div.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  div.addEventListener('dragend', () => div.classList.remove('dragging'));

  // Allow dropping onto a piece to reorder within answer zone
  div.addEventListener('dragover', e => { e.preventDefault(); div.style.borderTop = '2px solid var(--muted)'; });
  div.addEventListener('dragleave', () => div.style.borderTop = '');
  div.addEventListener('drop', e => {
    e.preventDefault();
    div.style.borderTop = '';
    if (dragFrom === 'answer' && zone === 'answer' && dragIdx !== lineIdx) {
      reorderAnswer(dragIdx, lineIdx);
    } else if (dragFrom === 'bank' && zone === 'answer') {
      moveToAnswerBefore(dragIdx, lineIdx);
    }
  });

  return div;
}

// ════════════════════════════════════════════════════
//  DRAG & DROP LOGIC
// ════════════════════════════════════════════════════
function dropToAnswer(e) {
  e.preventDefault();
  document.getElementById('answerZone').classList.remove('drag-over');
  if (dragIdx === null) return;
  const ps = pieceState[getPieceStateKey()];
  if (dragFrom === 'bank') {
    ps.bank = ps.bank.filter(i => i !== dragIdx);
    if (!ps.answer.includes(dragIdx)) ps.answer.push(dragIdx);
  }
  dragIdx = null; dragFrom = null;
  populateZones();
  clearFeedback();
}

function dropToBank(e) {
  e.preventDefault();
  document.getElementById('bankZone').classList.remove('drag-over');
  if (dragIdx === null) return;
  const ps = pieceState[getPieceStateKey()];
  if (dragFrom === 'answer') {
    ps.answer = ps.answer.filter(i => i !== dragIdx);
    if (!ps.bank.includes(dragIdx)) ps.bank.push(dragIdx);
  }
  dragIdx = null; dragFrom = null;
  populateZones();
  clearFeedback();
}

function reorderAnswer(fromIdx, toIdx) {
  const ps = pieceState[getPieceStateKey()];
  const arr = ps.answer;
  const fi = arr.indexOf(fromIdx);
  const ti = arr.indexOf(toIdx);
  if (fi < 0 || ti < 0) return;
  arr.splice(fi, 1);
  arr.splice(ti, 0, fromIdx);
  dragIdx = null; dragFrom = null;
  populateZones();
  clearFeedback();
}

function moveToAnswerBefore(fromIdx, toIdx) {
  const ps = pieceState[getPieceStateKey()];
  ps.bank = ps.bank.filter(i => i !== fromIdx);
  const ti = ps.answer.indexOf(toIdx);
  if (ti >= 0) ps.answer.splice(ti, 0, fromIdx);
  else ps.answer.push(fromIdx);
  dragIdx = null; dragFrom = null;
  populateZones();
  clearFeedback();
}

// ════════════════════════════════════════════════════
//  CHECK ANSWER
// ════════════════════════════════════════════════════
function checkAnswer() {
  const key = getPieceStateKey();
  const ps = pieceState[key];
  const pz = LEVELS[curLevel].puzzles[curPuzzle];

  if (ps.answer.length !== pz.lines.length) {
    showFeedback(`⚠ Place all ${pz.lines.length} pieces in the answer zone first. (${ps.answer.length} placed so far)`, false);
    return;
  }

  // Highlight pieces and collect wrong positions
  const ansZone = document.getElementById('answerZone');
  const pieces = ansZone.querySelectorAll('.code-piece');
  let allOk = true;
  const wrongPositions = [];

  pieces.forEach((piece, pos) => {
    const li = parseInt(piece.dataset.lineIdx);
    if (li === pos) {
      piece.classList.add('correct');
      piece.classList.remove('wrong');
    } else {
      piece.classList.add('wrong');
      piece.classList.remove('correct');
      allOk = false;
      wrongPositions.push(pos + 1); // 1-indexed for students
    }
  });

  if (allOk) {
    showFeedback('🎉 Perfect! All lines in the right order!', true);
    // Reset attempts on success
    attemptCounts[key] = 0;
    hideSolutionBtn();
    markSolved(curLevel, curPuzzle);
    renderLevelButtons();
    renderPuzzleTabs();
    updateTotalScore();
    document.querySelectorAll('.dot')[curPuzzle].classList.add('done');
    if (levelComplete(curLevel)) {
      setTimeout(() => {
        document.getElementById('levelComplete').classList.add('show');
      }, 600);
    }
  } else {
    // Increment attempt counter
    if (!attemptCounts[key]) attemptCounts[key] = 0;
    attemptCounts[key]++;
    const attempts = attemptCounts[key];
    const remaining = Math.max(0, 2 - attempts);

    // Build specific feedback
    let msg = `✗ Not quite — ${wrongPositions.length} line${wrongPositions.length > 1 ? 's' : ''} wrong (position${wrongPositions.length > 1 ? 's' : ''} ${wrongPositions.join(', ')}).`;
    if (remaining > 0) {
      msg += ` ${remaining} attempt${remaining > 1 ? 's' : ''} before Solution unlocks.`;
    }
    showFeedback(msg, false);

    // Show line-specific hint after first fail
    const hintLineBox = document.getElementById('hintLineBox');
    if (attempts >= 1 && hintLineBox) {
      // Give a nudge about the first wrong line
      const firstWrong = wrongPositions[0];
      const correctPiece = pz.lines[firstWrong - 1];
      hintLineBox.style.display = 'block';
      hintLineBox.innerHTML = `💬 <strong>Line ${firstWrong} hint:</strong> This position should start with <code style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;">${correctPiece.trim().split(' ').slice(0,3).join(' ')}…</code>`;
    }

    // Unlock Solution button after 2 failed attempts
    if (attempts >= 2) {
      showSolutionBtn();
    }
  }
}

function showSolutionBtn() {
  const btn = document.getElementById('solutionBtn');
  if (btn) {
    btn.style.display = 'inline-flex';
    btn.style.animation = 'fadeIn 0.4s ease';
  }
}

function hideSolutionBtn() {
  const btn = document.getElementById('solutionBtn');
  if (btn) btn.style.display = 'none';
  const hintLineBox = document.getElementById('hintLineBox');
  if (hintLineBox) hintLineBox.style.display = 'none';
}

function showSolution() {
  const lang = 'python';
  const pz = LEVELS[curLevel].puzzles[curPuzzle];
  const key = getPieceStateKey();

  // Clear bank, place all pieces in correct order
  const n = pz.lines.length;
  pieceState[key] = { bank: [], answer: [...Array(n).keys()], indents: Array(n).fill(0) };
  populateZones();

  // Highlight all correct
  setTimeout(() => {
    document.querySelectorAll('#answerZone .code-piece').forEach(p => {
      p.classList.add('correct');
      p.classList.remove('wrong');
    });
    showFeedback('👁 Solution revealed — study the order carefully!', true);
    const hintLineBox = document.getElementById('hintLineBox');
    if (hintLineBox) hintLineBox.style.display = 'none';
  }, 50);
}

function showFeedback(msg, ok) {
  const el = document.getElementById('feedbackMsg');
  el.textContent = msg;
  el.className = 'feedback-msg show ' + (ok ? 'ok' : 'fail');
}

function clearFeedback() {
  const el = document.getElementById('feedbackMsg');
  if (el) el.className = 'feedback-msg';
  document.querySelectorAll('.code-piece').forEach(p => {
    p.classList.remove('correct', 'wrong');
  });
  const hintLineBox = document.getElementById('hintLineBox');
  if (hintLineBox) hintLineBox.style.display = 'none';
}

function toggleHint() {
  const h = document.getElementById('hintBox');
  h.classList.toggle('show');
}

function shufflePuzzle() {
  const key = getPieceStateKey();
  const n = LEVELS[curLevel].puzzles[curPuzzle].lines.length;
  const all = [...Array(n).keys()].sort(() => Math.random() - 0.5);
  pieceState[key] = { bank: all, answer: [], indents: Array(n).fill(0) };
  attemptCounts[key] = 0;
  hideSolutionBtn();
  clearFeedback();
  populateZones();
}

// ════════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════════
function selectLevel(lvl) {
  curLevel = lvl;
  curPuzzle = 0;
  render();
}

function selectPuzzle(pzl) {
  curPuzzle = pzl;
  renderPuzzleTabs();
  renderMainArea();
}

function updateTotalScore() {
  const prog = loadProgress();
  document.getElementById('totalSolved').textContent = prog.solved.length;
}

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
render();
</script>
